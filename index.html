<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>kzk4043 - Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        
        #canvas:active {
            cursor: grabbing;
        }
        
        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            z-index: 100;
        }
        
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: #1a1a1a;
            padding: 2rem;
            border-radius: 10px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
            position: relative;
        }
        
        .close {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 28px;
            cursor: pointer;
            color: #fff;
        }
        
        .close:hover {
            opacity: 0.7;
        }
        
        .instructions {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            color: #ccc;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">Loading...</div>
    <canvas id="canvas"></canvas>
    
    <div class="instructions">
        Click on objects to learn more about me
    </div>
    
    <!-- About Modal -->
    <div id="aboutModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>About Me</h2>
            <div id="aboutContent"></div>
        </div>
    </div>
    
    <!-- Skills Modal -->
    <div id="skillsModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Skills</h2>
            <div id="skillsContent"></div>
        </div>
    </div>
    
    <!-- Works Modal -->
    <div id="worksModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Works</h2>
            <div id="worksContent"></div>
        </div>
    </div>
    
    <!-- Contact Modal -->
    <div id="contactModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Contact</h2>
            <div id="contactContent"></div>
        </div>
    </div>
    
    <script type="module" src="/src/main.js"></script>
</body>
</html>
